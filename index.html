<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kitchen Production Labels</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:900px;
}

h2{
    margin-top:0;
}

select, input, button{
    padding:12px;
    font-size:16px;
    margin:5px;
}

button{
    cursor:pointer;
    font-weight:bold;
}

table{
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kitchen Production Labels</h2>

<select id="product">
    <option value="COOK">COOK</option>
    <option value="PNUT">PNUT</option>
    <option value="KIND">KIND</option>
    <option value="BISC">BISC</option>
    <option value="FERR">FERR</option>
    <option value="MALT">MALT</option>
    <option value="BOUNT">BOUNT</option>
    <option value="SNICK">SNICK</option>
    <option value="COCO">COCO</option>
    <option value="PECAN">PECAN</option>
    <option value="CRAN">CRAN</option>
    <option value="BROW">BROW</option>
    <option value="OCUP">OCUP</option>
    <option value="PBBAR">PBBAR</option>
    <option value="OREO">OREO</option>
</select>

<input id="qty" type="number" min="1" placeholder="Quantity">

<button onclick="addItem()">Add Item</button>
<button onclick="generatePDF()">Generate Labels</button>

<table>
    <thead>
        <tr>
            <th>Product</th>
            <th>Qty</th>
        </tr>
    </thead>
    <tbody id="list"></tbody>
</table>

</div>

<script>

let items = [];

function addItem(){

    const product = document.getElementById("product").value;
    const qty = parseInt(document.getElementById("qty").value);

    if(!qty || qty <= 0){
        alert("Enter valid quantity");
        return;
    }

    items.push({ product, qty });

    document.getElementById("list").innerHTML += `
        <tr>
            <td>${product}</td>
            <td>${qty}</td>
        </tr>
    `;

    document.getElementById("qty").value = "";
}

function getJulian(){

    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const diff = now - start;
    const day = Math.floor(diff / (1000 * 60 * 60 * 24));

    const year = now.getFullYear().toString().slice(-2);

    return year + String(day).padStart(3, "0");
}

function getProductionDate(){

    const now = new Date();

    return (
        String(now.getDate()).padStart(2,"0") + "/" +
        String(now.getMonth()+1).padStart(2,"0") + "/" +
        now.getFullYear()
    );
}

function generatePDF(){

    if(items.length === 0){
        alert("No items added");
        return;
    }

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
        orientation: "landscape",
        unit: "mm",
        format: [400, 300]
    });

    const centerX = 200;

    const julian = getJulian();
    const productionDate = getProductionDate();

    let totalLabels = items.reduce((sum, i) => sum + i.qty, 0);
    let labelIndex = 0;

    items.forEach(item => {

        let productCounter = 1;

        for(let i = 0; i < item.qty; i++){

            const batchNum = String(productCounter).padStart(2, "0");
            const batchCode = `${item.product}-${julian}-${batchNum}`;

            doc.setFont("helvetica", "bold");

            // PRODUCT LABEL (tight)
            doc.setFontSize(36);
            doc.text("PRODUCT:", centerX, 30, { align:"center" });

            doc.setFontSize(88);
            doc.text(item.product, centerX, 65, { align:"center" });

            // BATCH CODE LABEL (tight)
            doc.setFontSize(34);
            doc.text("BATCH CODE:", centerX, 105, { align:"center" });

            doc.setFontSize(110);
            doc.text(batchCode, centerX, 140, { align:"center" });

            // DATE LABEL (tight)
            doc.setFontSize(34);
            doc.text("PRODUCTION DATE:", centerX, 180, { align:"center" });

            doc.setFontSize(110);
            doc.text(productionDate, centerX, 215, { align:"center" });

            labelIndex++;

            if(labelIndex < totalLabels){
                doc.addPage([400, 300], "landscape");
            }

            productCounter++;
        }
    });

    doc.save("kitchen_labels.pdf");
}

</script>

</body>
</html>
